<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Golden Chinese Dragon Project</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);

        const dragonGroup = new THREE.Group();
        scene.add(dragonGroup);

        const uniforms = {
            uTime: { value: 0.0 }
        };

        const vertexShader = `
            varying vec3 vNormal;
            varying vec3 vViewPosition;
            uniform float uTime;

            void main() {
                vNormal = normalize(normalMatrix * normal);
                
                vec3 newPosition = position;
                
                float amplitude = 0.05; 
                float frequency = 2.0;
                float speed = 3.0;

                newPosition.x += sin(newPosition.y * frequency + uTime * speed) * amplitude;
                newPosition.z += cos(newPosition.y * frequency + uTime * speed) * amplitude * 0.5;

                vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
                vViewPosition = -mvPosition.xyz;

                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const fragmentShader = `
            varying vec3 vNormal;
            varying vec3 vViewPosition;

            void main() {
                vec3 normal = normalize(vNormal);
                vec3 viewDir = normalize(vViewPosition);

                vec3 lightDir = normalize(vec3(0.5, 1.0, 0.75));

                vec3 goldColor = vec3(1.0, 0.84, 0.0);
                vec3 goldShadow = vec3(0.5, 0.35, 0.0);
                vec3 goldHighlight = vec3(1.0, 1.0, 0.8);

                float diff = max(dot(normal, lightDir), 0.0);
                vec3 diffuse = mix(goldShadow, goldColor, diff);

                vec3 halfwayDir = normalize(lightDir + viewDir);
                float spec = pow(max(dot(normal, halfwayDir), 0.0), 32.0);
                vec3 specular = goldHighlight * spec * 0.9;

                gl_FragColor = vec4(diffuse + specular, 1.0);
            }
        `;
        
        const customShaderMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms, 
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            side: THREE.DoubleSide
        });

        const loader = new STLLoader();
        loader.load('./models/main.stl', function (geometry) {
            geometry.center();
            const mesh = new THREE.Mesh(geometry, customShaderMaterial);
            mesh.scale.set(0.1, 0.1, 0.1);
            
            mesh.rotation.x = -Math.PI / 2;
            
            dragonGroup.add(mesh);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            dragonGroup.rotation.y += 0.005; 
            customShaderMaterial.uniforms.uTime.value = clock.getElapsedTime();

            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
